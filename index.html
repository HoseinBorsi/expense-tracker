<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ردیاب هزینه | مدیریت هزینه‌های روزانه</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ===== هدر ===== -->
        <header class="app-header">
            <div class="header-top">
                <h1 class="app-title">💰 ردیاب هزینه</h1>
                <span class="header-date" id="header-date"></span>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="search-toggle" title="جستجو">🔍</button>
                <button class="header-btn" id="export-csv-btn" title="خروجی اکسل">📊</button>
                <button class="header-btn" id="export-json-btn" title="خروجی JSON">📥</button>
            </div>
        </header>

        <!-- ===== بخش جستجو (مخفی اولیه) ===== -->
        <div class="search-bar hidden" id="search-bar">
            <input type="text" id="search-input" placeholder="جستجو بین هزینه‌ها...">
            <button class="search-close" id="search-close">✕</button>
        </div>

        <!-- ===== جمع ماهانه ===== -->
        <section class="summary-card" id="summary-section">
            <div class="summary-header">
                <span class="summary-label">📊 جمع ماه جاری</span>
                <select class="month-picker" id="month-picker"></select>
            </div>
            <div class="summary-total" id="summary-total">
                <span class="total-amount">۰</span>
                <span class="total-currency">تومان</span>
            </div>
            <div class="summary-stats" id="summary-stats">
                <span class="stat-item">
                    <span class="stat-label">تعداد</span>
                    <span class="stat-value" id="stat-count">۰</span>
                </span>
                <span class="stat-divider">|</span>
                <span class="stat-item">
                    <span class="stat-label">میانگین روزانه</span>
                    <span class="stat-value" id="stat-average">۰</span>
                </span>
            </div>
        </section>

        <!-- ===== فرم افزودن هزینه (کارت جمع‌شونده) ===== -->
        <section class="add-card">
            <button class="add-toggle" id="add-toggle">
                <span>➕ افزودن هزینه جدید</span>
                <span class="toggle-arrow" id="toggle-arrow">▼</span>
            </button>
            <div class="add-form-container" id="add-form-container">
                <form id="expense-form">
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="amount">مقدار (تومان)</label>
                            <input type="number" id="amount" min="1" step="1000" placeholder="مثال: ۵۰۰۰۰" required>
                        </div>
                        <div class="form-group half">
                            <label for="category">دسته‌بندی</label>
                            <select id="category">
                                <option value="خوراکی">🍔 خوراکی</option>
                                <option value="حمل و نقل">🚗 حمل و نقل</option>
                                <option value="مسکن">🏠 مسکن</option>
                                <option value="تفریح">🎮 تفریح</option>
                                <option value="سلامت">💊 سلامت</option>
                                <option value="خرید">🛒 خرید</option>
                                <option value="سایر">📌 سایر</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">توضیح</label>
                        <input type="text" id="description" placeholder="مثال: ناهار امروز" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group third">
                            <label for="j-year">سال</label>
                            <select id="j-year"></select>
                        </div>
                        <div class="form-group third">
                            <label for="j-month">ماه</label>
                            <select id="j-month"></select>
                        </div>
                        <div class="form-group third">
                            <label for="j-day">روز</label>
                            <select id="j-day"></select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-add">💾 ثبت هزینه</button>
                </form>
            </div>
        </section>

        <!-- ===== لیست هزینه‌ها ===== -->
        <section class="list-section">
            <div class="list-header">
                <h2>📋 هزینه‌ها</h2>
                <span class="list-count" id="list-count">۰ مورد</span>
            </div>
            <div id="expenses-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>هنوز هزینه‌ای ثبت نکردی!</p>
                    <p class="empty-hint">روی دکمه بالا کلیک کن و اولین هزینه رو اضافه کن.</p>
                </div>
                <div id="expenses-list"></div>
            </div>
        </section>

        <!-- ===== دکمه رفتن به بالای صفحه ===== -->
        <button class="fab" id="fab-top" title="برو به بالا">↑</button>
    </div>

    <script src="lib/jalali.js"></script>
    <script src="script.js"></script>
</body>
</html>
